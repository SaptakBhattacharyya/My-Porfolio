    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Clicker Game</title>
        <link rel="stylesheet" href="./style.css">
    </head>

    <body>
        <div class="container">
            <h1>Click Counter Game</h1>
            <p class="subtitle">CLick as fast as u can!</p>
            <!--Score Display Section-->
            <div class="score-section">
                <div class="score-box">
                    <h2>Current Score</h2>
                    <div id="currentScore" class="score">0</div>
                </div>
                <div class="score-box">
                    <h2>High Score</h2>
                    <div id="highscore" class="score">0</div>
                </div>
            </div>
            <!--Timer Display-->
            <div class="timer-section">
                <h2>Time Remaining</h2>
                <div id="timer" class="timer">10</div>
            </div>
            <!--Game Buttons-->
            <div class="button-section">
                <button id="clickButton" class="click-btn" disabled>
                    Click Me!
                </button>
                <button id="startButton" class="start-btn">
                    Start Game
                </button>
                <button id="resetButton" class="reset-btn">Reset High Score</button>
                 <button id="pauseButton" class="pause-btn">Pause</button>
                 <button id="resumeButton" class="resume-btn">Resume</button>
            </div>
            <!-- User Name Input -->
            <div class="user-section">
                <label for="userName">Enter your name:</label>
                <input type="text" id="userName" name="userName" placeholder="Your name">
            </div>
            <!-- Winning Video (hidden by default) -->
            <div id="winVideoContainer" style="display:none;">
                <video id="winVideo" width="320" height="240" controls>
                    <source src="c:\Users\Saptak\OneDrive\Videos\2025-10-27 22-00-20.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div id="statusMessage" class="status-message">Click "Start Game" to begin!
            </div>
        </div>
        <script src="./1st.js"></script>
    </body>

    </html>


</body>
